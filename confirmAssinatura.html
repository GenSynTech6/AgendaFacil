<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Confirmada - Agenda Fácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .card-dark {
            background: #1E1E1E;
            border: 1px solid #2D2D2D;
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto;
        }

        .check-icon {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            border: 4px solid #22d3ee;
        }

        .icon-line {
            height: 5px;
            background-color: #22d3ee;
            display: block;
            border-radius: 2px;
            position: absolute;
            z-index: 10;
        }

        .icon-line.line-tip {
            top: 46px;
            left: 14px;
            width: 25px;
            transform: rotate(45deg);
            animation: icon-line-tip 0.75s;
        }

        .icon-line.line-long {
            top: 38px;
            right: 8px;
            width: 47px;
            transform: rotate(-45deg);
            animation: icon-line-long 0.75s;
        }

        @keyframes icon-line-tip {
            0% {
                width: 0;
                left: 1px;
                top: 19px;
            }

            100% {
                width: 25px;
                left: 14px;
                top: 46px;
            }
        }

        @keyframes icon-line-long {
            0% {
                width: 0;
                right: 46px;
                top: 54px;
            }

            100% {
                width: 47px;
                right: 8px;
                top: 38px;
            }
        }

        .btn-teal {
            background: linear-gradient(135deg, #0891b2, #1e3a8a);
        }

        @media print {
            .no-print {
                display: none;
            }

            body {
                background: white;
                color: black;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full card-dark rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/5">
        <div class="pt-12 pb-6 text-center">
            <div class="success-checkmark mb-6">
                <div class="check-icon">
                    <span class="icon-line line-tip"></span>
                    <span class="icon-line line-long"></span>
                </div>
            </div>
            <h1 class="text-2xl font-bold italic">Agenda <span class="text-cyan-400">Fácil</span></h1>
            <p class="text-gray-400 text-sm mt-2 uppercase tracking-widest font-semibold">Assinatura Ativa!</p>
        </div>

        <div class="px-8 pb-8">
            <div class="bg-black/20 rounded-2xl p-5 border border-white/5 mb-6 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-gray-500 text-[10px] uppercase font-bold">Plano</span>
                    <span class="text-cyan-400 font-bold text-sm" id="plan-name italic">Carregando...</span>
                </div>
                <div class="flex justify-between items-center border-t border-white/5 pt-4">
                    <span class="text-gray-500 text-[10px] uppercase font-bold">Valor Pago</span>
                    <span class="text-white font-bold text-sm" id="amount-paid">R$ 0,00</span>
                </div>
                <div class="flex justify-between items-center border-t border-white/5 pt-4">
                    <span class="text-gray-500 text-[10px] uppercase font-bold">Expira em</span>
                    <span class="text-white font-bold text-sm" id="next-billing">--/--/----</span>
                </div>
            </div>

            <p class="text-center text-[10px] text-gray-500 mb-8 uppercase tracking-wider leading-relaxed">
                Sua conta foi atualizada com sucesso. <br> O comprovante está disponível para impressão.
            </p>

            <div class="space-y-3 no-print">
                <button onclick="window.location.href='index.html'"
                    class="btn-teal w-full text-black font-bold py-4 rounded-2xl uppercase tracking-widest text-xs shadow-lg hover:scale-[1.02] transition">
                    Acessar Meu Painel
                </button>
                <button onclick="window.print()"
                    class="w-full bg-white/5 border border-white/10 text-gray-400 font-bold py-3 rounded-2xl text-[10px] uppercase tracking-widest hover:bg-white/10 transition">
                    Imprimir Comprovante
                </button>
            </div>
        </div>

        <div class="bg-black/20 py-4 px-8 text-center border-t border-white/5">
            <p class="text-[9px] text-gray-600 font-mono uppercase">ID: <span id="transaction-id">------</span></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa4sZN42xSCw1nggj5wi-_AsuzGMfBEYg",
            authDomain: "barbershopsaas-2af6c.firebaseapp.com",
            projectId: "barbershopsaas-2af6c",
            storageBucket: "barbershopsaas-2af6c.firebasestorage.app",
            messagingSenderId: "939177796204",
            appId: "1:939177796204:web:f54a3cd48c485076d8ae49"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 1. LÓGICA DE EXIBIÇÃO (Captura exata dos dados do checkout)
        const carregarDadosComprovante = () => {
            const urlParams = new URLSearchParams(window.location.search);

            // Captura os valores vindos da URL do checkout
            const plano = urlParams.get('plan') || "Plano Profissional";
            const valorRaw = urlParams.get('valor') || "0.00"; // Usamos 'valor' que enviamos no checkout
            const idTransacao = urlParams.get('id') || "MP-TEMP-" + Math.random().toString(36).substring(2, 9).toUpperCase();

            // Formata o valor para o padrão R$ 00,00
            const valorFormatado = parseFloat(valorRaw).toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            });

            // Atualiza o HTML com segurança
            const planEl = document.getElementById('plan-name italic'); // Mantendo seu ID original
            if (planEl) planEl.textContent = plano;

            document.getElementById('amount-paid').textContent = valorFormatado;
            document.getElementById('transaction-id').textContent = idTransacao;

            // Calcula Expiração Real (30 dias a partir de hoje)
            const dataExpira = new Date();
            dataExpira.setDate(dataExpira.getDate() + 30);
            document.getElementById('next-billing').textContent = dataExpira.toLocaleDateString('pt-BR');
        };

        // 2. INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', carregarDadosComprovante);

        // 3. VERIFICAÇÃO DE SEGURANÇA
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                console.warn("Acesso sem login detectado.");
                // Opcional: window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
