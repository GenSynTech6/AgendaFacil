<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="icon" href="assets/img/barbersys.ico">
    <title>Agendar Horário - Agenda Fácil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #121212;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .teal {
            background: linear-gradient(135deg, #1b38f3, #131530);
        }

        .card {
            background: #1E1E1E;
            border: 1px solid #2D2D2D;
        }

        input,
        select {
            background: #2D2D2D !important;
            color: white !important;
            border: 1px solid #444 !important;
            outline: none;
        }

        input:focus {
            border-color: #D4AF37 !important;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="p-6">
    <div class="max-w-md mx-auto">
        <header class="text-center mb-8">
            <h1 id="nome-barbearia" class="text-teal-200 text-3xl font-bold italic ">Carregando barbearia...</h1>
            <p class="text-gray-400 text-sm italic">Agenda<span class="text-cyan-400">Fácil</span></p>
        </header>

        <div id="form-container" class="card p-6 rounded-2xl shadow-2xl border-t-4 border-cyan-400">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500">Seu Nome</label>
                    <input id="cliente-nome" type="text" placeholder="Ex: João Silva"
                        class="w-full p-3 rounded-lg mt-1">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500">Seu WhatsApp (DDD + Número)</label>
                    <input id="cliente-fone" type="tel" placeholder="Ex: 11999998888"
                        class="w-full p-3 rounded-lg mt-1">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500">Escolha o Serviço</label>
                    <select id="cliente-servico" class="w-full p-3 rounded-lg mt-1">
                        <option value="">Aguardando identificação...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Data</label>
                        <input id="cliente-data" type="date" class="w-full p-3 rounded-lg mt-1">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Horário</label>
                        <input id="cliente-hora" type="time" class="w-full p-3 rounded-lg mt-1">
                    </div>
                </div>
                <button id="btn-confirmar"
                    class="teal w-full p-4 rounded-xl text-black font-bold uppercase mt-4 hover:brightness-110 active:scale-95 transition">Confirmar
                    Agendamento</button>
            </div>
        </div>

        <div id="feedback-sucesso" class="hidden text-center p-10 card rounded-2xl">
            <div class="text-6xl mb-4">✨</div>
            <h2 class="text-2xl font-bold text-teal-400">Tudo pronto!</h2>
            <p class="text-gray-400 mt-2">Seu horário foi reservado. Nos vemos em breve!</p>
            <button onclick="location.reload()" class="mt-6 text-sm text-gray-500 underline">Fazer outro
                agendamento</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAa4sZN42xSCw1nggj5wi-_AsuzGMfBEYg",
            authDomain: "barbershopsaas-2af6c.firebaseapp.com",
            projectId: "barbershopsaas-2af6c",
            storageBucket: "barbershopsaas-2af6c.firebasestorage.app",
            messagingSenderId: "939177796204",
            appId: "1:939177796204:web:f54a3cd48c485076d8ae49",
            measurementId: "G-NP7SYJHN84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const BARBER_ID = urlParams.get('id');

        if (!BARBER_ID) {
            alert("Link inválido!");
            document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:50px;'>Negócio não encontrado.</h1>";
        }

        async function inicializarPagina() {
            console.log("Tentando carregar serviços para o ID:", BARBER_ID);
            try {
                // 1. Testa se o Firebase responde para o Perfil
                const perfilSnap = await getDoc(doc(db, "perfis", BARBER_ID));
                if (perfilSnap.exists()) {
                    document.getElementById("nome-barbearia").innerText = perfilSnap.data().nomeBarbearia;
                    console.log("Perfil encontrado!");
                }

                // 2. Busca simplificada de serviços
                const q = query(collection(db, "servicos"), where("userId", "==", BARBER_ID));
                const snap = await getDocs(q);

                console.log("Resultado da busca (tamanho):", snap.size);

                let html = '<option value="">Selecione o serviço...</option>';

                if (snap.empty) {
                    console.warn("A busca retornou zero documentos para este userId.");
                    html = '<option value="">Nenhum serviço disponível.</option>';
                } else {
                    snap.forEach(doc => {
                        const s = doc.data();
                        html += `<option value="${s.preco}" data-nome="${s.nome}">${s.nome} - R$ ${Number(s.preco).toFixed(2)}</option>`;
                    });
                }
                document.getElementById("cliente-servico").innerHTML = html;

            } catch (e) {
                // ESTA PARTE É A MAIS IMPORTANTE:
                console.error("ERRO DETALHADO DO FIREBASE:", e);
                alert("Erro técnico: " + e.message);

                if (e.message.includes("index")) {
                    console.error("Você precisa criar um índice. Procure o link azul acima no console!");
                }
            }
        }

        inicializarPagina();

        // Ação de Agendar
        document.getElementById("btn-confirmar").onclick = async () => {
            const nome = document.getElementById("cliente-nome").value;
            const fone = document.getElementById("cliente-fone").value;
            const data = document.getElementById("cliente-data").value;
            const hora = document.getElementById("cliente-hora").value;
            const select = document.getElementById("cliente-servico");

            if (!nome || !fone || !data || !hora || !select.value) {
                return alert("Por favor, preencha todos os campos!");
            }

            try {
                await addDoc(collection(db, "agendamentos"), {
                    cliente: nome,
                    fone: fone,
                    data: data,
                    hora: hora,
                    servico: select.options[select.selectedIndex].getAttribute('data-nome'),
                    preco: parseFloat(select.value),
                    status: "pendente",
                    externo: true,
                    userId: BARBER_ID,
                    criado: serverTimestamp()
                });

                document.getElementById("form-container").classList.add("hidden");
                document.getElementById("feedback-sucesso").classList.remove("hidden");
            } catch (e) {
                alert("Erro ao agendar. Tente novamente.");
            }
        };
    </script>
</body>

</html>
