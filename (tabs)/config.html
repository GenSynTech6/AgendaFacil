<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - AgendaFacil</title>
    <link rel="icon" width="822" href="assets/img/LogoAgendaFacil.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        card: '#161616',
                        border: '#262626',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }

        .tab-active {
            color: #22d3ee;
        }

        .tab-inactive {
            color: #525252;
        }

        .glass-card {
            background: linear-gradient(145deg, #161616, #0a0a0a);
            border: 1px solid #262626;
        }
    </style>
</head>

<body class="pb-32">

    <div id="view-config" class="p-6 md:p-10 max-w-4xl mx-auto">
        <header class="relative mb-10 p-8 rounded-[2.5rem] overflow-hidden border border-white/5 bg-card shadow-2xl">
            <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-cyan-500/10 blur-[80px] rounded-full"></div>
            <p class="text-[10px] text-neutral-500 font-bold uppercase tracking-[0.2em] mt-1">Mateus 6:33</p>
            <div class="relative z-10 flex flex-col items-center text-center">
                <div class="relative mb-4">
                    <div class="absolute -inset-2 bg-cyan-500/20 rounded-full blur-xl animate-pulse"></div>
                    <div
                        class="relative w-20 h-20 bg-dark rounded-full flex items-center justify-center border border-cyan-500/30 shadow-2xl">
                        <span id="initials-display" class="text-3xl font-black text-cyan-400">--</span>
                    </div>
                </div>

                <h1 id="display-nome-barber" class="text-2xl font-black text-white tracking-tighter italic">
                    Carregando...</h1>
                <p id="user-email-display"
                    class="text-[10px] text-neutral-500 font-bold uppercase tracking-[0.2em] mt-1">---</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-card p-6 rounded-[2.5rem] border border-border flex flex-col justify-between shadow-xl">
                <div>
                    <div class="flex items-center gap-3 mb-6">
                        <div class="p-2 bg-cyan-500/10 rounded-xl text-cyan-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                        </div>
                        <h3 class="font-black text-white uppercase text-[10px] tracking-[0.2em]">Link de Agendamento
                        </h3>
                    </div>
                    <p class="text-neutral-500 text-[11px] mb-6 leading-relaxed">Seu link exclusivo para clientes
                        agendarem direto pelo Instagram ou WhatsApp.</p>
                    <input id="link-externo" readonly
                        class="w-full bg-black border border-white/5 p-4 rounded-2xl text-[10px] text-cyan-400 font-mono mb-4 text-center focus:outline-none"
                        value="Gerando link...">
                </div>
                <button onclick="copiarLink()"
                    class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-cyan-400 transition-all active:scale-95 shadow-lg shadow-cyan-500/20">Copiar
                    Link</button>
            </div>

            <div class="space-y-6">
                <div class="bg-card p-6 rounded-[2.5rem] border border-border">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-cyan-500/10 rounded-xl text-cyan-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                                </svg>
                            </div>
                            <h3 class="font-black text-white text-xs uppercase tracking-tighter">Notificações</h3>
                        </div>
                        <button onclick="ativarNotificacoes()"
                            class="text-[10px] font-black text-cyan-400 uppercase tracking-widest bg-cyan-400/10 px-4 py-2 rounded-full border border-cyan-400/20">Ativar</button>
                    </div>
                    <div class="flex items-center justify-between p-4 bg-black/40 rounded-2xl border border-white/5">
                        <span class="text-[10px] text-neutral-500 font-black uppercase tracking-widest">Status da
                            Nuvem</span>
                        <span class="flex items-center gap-2 text-[10px] font-bold text-cyan-400">
                            <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                            ONLINE
                        </span>
                    </div>
                </div>
                <div
                    class="bg-card p-8 rounded-[2.5rem] w-full max-w-sm text-center border border-cyan-500/30 shadow-2xl">
                    <div class="text-2xl mb-6">Mudar plano</div>
                    <a href="https://agendafacil.buzz/contratacaoAssinatura.html"><button
                            class="w-full bg-cyan-500 p-4 rounded-2xl text-black font-black uppercase text-xs tracking-widest shadow-lg shadow-cyan-500/20 active:scale-95 transition">Ativar
                            Agora</button></a>
                </div>
                <button onclick="fazerLogout()"
                    class="w-full bg-white/5 hover:bg-red-500/10 hover:text-red-500 text-neutral-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all border border-white/5">Sair
                    da Conta</button>
            </div>
        </div>
    </div>

    <nav
        class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-card/80 backdrop-blur-xl border border-white/5 p-2 rounded-[2.5rem] flex justify-between items-center shadow-2xl z-50">
        <a href="https://agendafacil.buzz/index.html"><button class="flex-1 py-3 flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Início</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/clientes.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Clientes</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/servicos.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758L5 19m0-14l4.121 4.121" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Serviços</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/config.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition tab-active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Ajustes</span>
            </button></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppcnfUc5N4xuWq0UUmg6_idNLY8vRQdw",
            authDomain: "agendafacil-1.firebaseapp.com",
            projectId: "agendafacil-1",
            storageBucket: "agendafacil-1.firebasestorage.app",
            messagingSenderId: "862585496599",
            appId: "1:862585496599:web:2a360f1147a334d1342852"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
       
        // FUNÇÃO GLOBAL DE LOGOUT
        window.fazerLogout = () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Link final aponta para a página externa agendar.html
                const linkFinal = `https://agendafacil.buzz/agendar.html?id=${user.uid}`;
                document.getElementById("link-externo").value = linkFinal;
                document.getElementById("user-email-display").innerText = user.email;

                const nomeBarbeiro = user.nomeDisplay || user.email.split('@')[0];
                document.getElementById("display-nome-barber").innerText = nomeBarbeiro;

                const iniciais = nomeBarbeiro.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                document.getElementById("initials-display").innerText = iniciais || "??";
            } else {
                window.location.href = "login.html";
            }
        });

        window.copiarLink = () => {
            const linkInput = document.getElementById("link-externo");
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value).then(() => {
                alert("Link copiado! Coloque na bio do seu Instagram.");
            });
        };

        window.ativarNotificacoes = () => {
            Notification.requestPermission().then(p => {
                if (p === "granted") alert("Sons e alertas ativados!");
                else alert("Você precisa autorizar as notificações no navegador.");
            });
        };
    </script>
</body>

</html>
