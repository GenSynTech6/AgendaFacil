<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance - AgendaFacil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        card: '#161616',
                        border: '#262626',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .tab-active { color: #22d3ee; }
        .tab-inactive { color: #525252; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <div class="max-w-xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tighter italic italic">
                Agenda<span class="text-cyan-400">Facil</span>
            </h1>
            <p class="text-[10px] text-neutral-600 font-black tracking-[0.4em] uppercase mt-1">Performance & Analytics</p>
        </header>

        <div class="mb-8 p-8 rounded-[2.5rem] bg-card border border-cyan-400/20 text-center relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 blur-[60px] rounded-full"></div>
            <p class="relative z-10 text-[9px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-2">Faturamento Total Acumulado</p>
            <h3 class="relative z-10 text-5xl font-black text-white tracking-tighter italic" id="faturamento-total">R$ 0,00</h3>
        </div>

        <div class="grid grid-cols-1 gap-6 mb-10">
            <div class="bg-card p-6 rounded-[2.5rem] border border-border shadow-xl">
                <p class="text-[10px] text-neutral-500 font-black uppercase mb-6 tracking-widest text-center">Últimos 7 dias (R$)</p>
                <canvas id="chartSemana" height="180"></canvas>
            </div>

            <div class="bg-card p-6 rounded-[2.5rem] border border-border shadow-xl">
                <p class="text-[10px] text-neutral-500 font-black uppercase mb-6 tracking-widest text-center">Tendência Mensal</p>
                <canvas id="chartMes" height="180"></canvas>
            </div>
        </div>

        <div class="flex items-center justify-between mb-6 px-4">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-neutral-600">Atendimentos Concluídos</h2>
            <div class="h-[1px] flex-1 bg-border ml-6"></div>
        </div>
        
        <div id="lista-historico" class="space-y-4">
            <div class="text-center py-20 opacity-20">
                <p class="text-[10px] font-black uppercase tracking-widest">Carregando histórico...</p>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-card/80 backdrop-blur-xl border border-white/5 p-2 rounded-[2.5rem] flex justify-between items-center shadow-2xl z-50">
        <a href="https://agendafacil.buzz/index.html"><button class="flex-1 py-3 flex flex-col items-center gap-1 tab-active">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Início</span>
        </button></a>
        <a href="https://agendafacil.buzz/(tabs)/clientes.html">
            <button onclick="window.location.href='clientes.html'" class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Clientes</span>
        </button></a>
        <a href="https://agendafacil.buzz/(tabs)/historico.html">
            <button onclick="window.location.href='/historico.html'" class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Rendimento</span>
        </button></a>
        <a href="https://agendafacil.buzz/(tabs)/config.html"><button class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
            <span class="text-[8px] font-black uppercase tracking-tighter">Ajustes</span>
        </button></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppcnfUc5N4xuWq0UUmg6_idNLY8vRQdw",
            authDomain: "agendafacil-1.firebaseapp.com",
            projectId: "agendafacil-1",
            storageBucket: "agendafacil-1.firebasestorage.app",
            messagingSenderId: "862585496599",
            appId: "1:862585496599:web:2a360f1147a334d1342852"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let chartSemana, chartMes;

        onAuthStateChanged(auth, (user) => {
            if (user) iniciarEscutaHistorico(user.uid);
            else window.location.href = "login.html";
        });

        function iniciarEscutaHistorico(uid) {
            const q = query(collection(db, "agendamentos"), where("userId", "==", uid), where("status", "==", "concluido"));
            onSnapshot(q, (snap) => {
                let totalSoma = 0;
                let htmlAcumulado = "";
                const vendasPorDia = {};

                const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => `${b.data} ${b.hora}`.localeCompare(`${a.data} ${a.hora}`));

                docs.forEach(item => {
                    const preco = parseFloat(item.preco) || 0;
                    totalSoma += preco;
                    vendasPorDia[item.data] = (vendasPorDia[item.data] || 0) + preco;
                    
                    const dataBr = item.data.split('-').reverse().slice(0, 2).join('/');
                    htmlAcumulado += `
                    <div class="bg-card p-6 rounded-[2rem] border border-border flex justify-between items-center shadow-lg transition-transform active:scale-95">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-dark border border-white/5 flex items-center justify-center text-[10px] font-black text-cyan-400 shadow-inner">${dataBr}</div>
                            <div>
                                <p class="font-black text-sm text-white tracking-tighter">${item.cliente}</p>
                                <p class="text-[9px] text-neutral-600 uppercase font-black tracking-widest mt-1">${item.servico} • ${item.hora}</p>
                            </div>
                        </div>
                        <p class="text-cyan-400 font-black text-sm italic tracking-tighter">R$ ${preco.toFixed(2)}</p>
                    </div>`;
                });

                document.getElementById("lista-historico").innerHTML = htmlAcumulado || `<div class="py-20 text-center opacity-20 font-black uppercase text-[10px] tracking-[0.3em]">Nenhum registro encontrado</div>`;
                document.getElementById("faturamento-total").innerText = `R$ ${totalSoma.toFixed(2)}`;
                renderizarGraficos(vendasPorDia);
            });
        }

        function renderizarGraficos(dadosVendas) {
            const labelsSemana = []; const valoresSemana = [];
            const labelsMes = []; const valoresMes = [];

            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dataString = d.toISOString().split('T')[0];
                const dataFormatada = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

                labelsMes.push(dataFormatada);
                valoresMes.push(dadosVendas[dataString] || 0);

                if (i < 7) {
                    labelsSemana.push(dataFormatada);
                    valoresSemana.push(dadosVendas[dataString] || 0);
                }
            }

            if (chartSemana) chartSemana.destroy();
            if (chartMes) chartMes.destroy();

            const commonOptions = {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { display: false }, ticks: { color: '#404040', font: { size: 8, weight: 'bold' } } },
                    x: { grid: { display: false }, ticks: { color: '#404040', font: { size: 8, weight: 'bold' } } }
                }
            };

            chartSemana = new Chart(document.getElementById('chartSemana'), {
                type: 'bar',
                data: { labels: labelsSemana, datasets: [{ data: valoresSemana, backgroundColor: '#22d3ee', borderRadius: 6 }] },
                options: commonOptions
            });

            chartMes = new Chart(document.getElementById('chartMes'), {
                type: 'line',
                data: { labels: labelsMes, datasets: [{ data: valoresMes, borderColor: '#22d3ee', backgroundColor: 'rgba(34, 211, 238, 0.05)', fill: true, tension: 0.4, borderWidth: 2, pointRadius: 0 }] },
                options: commonOptions
            });
        }
    </script>
</body>
</html>
