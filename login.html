<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgendaFacil</title>
    <link rel="icon" width="822" href="assets/img/LogoAgendaFacil.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        card: '#161616',
                        border: '#262626',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; overflow: hidden; }
        .glass-card { background: rgba(22, 22, 22, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input:focus { border-color: #22d3ee !important; box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .gradient-btn { background: linear-gradient(135deg, #22d3ee, #0891b2); }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-cyan-500/10 blur-[120px] rounded-full -z-10"></div>

    <div class="w-full max-w-md glass-card p-10 rounded-[3rem] shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-900 italic tracking-tighter uppercase">
                Agenda <span class="text-cyan-400">Fácil</span>
            </h1>
            <p id="login-subtitle" class="text-[9px] text-neutral-500 font-black uppercase tracking-[0.4em] mt-2">Gestão Profissional</p>
        </header>

        <div class="space-y-4">
            <div id="area-cadastro" class="hidden animate-in fade-in duration-500">
                <label class="text-[10px] text-neutral-500 font-black uppercase tracking-widest ml-4 mb-2 block">Nome do Negócio</label>
                <input id="reg-nome-barbearia" placeholder="Ex: Barber Shop Elite"
                    class="w-full bg-neutral-900 border border-border p-4 rounded-2xl text-sm font-bold outline-none transition-all placeholder:text-neutral-700">
            </div>

            <div>
                <label class="text-[10px] text-neutral-500 font-black uppercase tracking-widest ml-4 mb-2 block">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com"
                    class="w-full bg-neutral-900 border border-border p-4 rounded-2xl text-sm font-bold outline-none transition-all placeholder:text-neutral-700">
            </div>

            <div>
                <label class="text-[10px] text-neutral-500 font-black uppercase tracking-widest ml-4 mb-2 block">Senha</label>
                <input id="senha" type="password" placeholder="••••••••"
                    class="w-full bg-neutral-900 border border-border p-4 rounded-2xl text-sm font-bold outline-none transition-all placeholder:text-neutral-700">
            </div>

            <button id="btn-principal" class="gradient-btn w-full p-5 rounded-[2rem] text-black font-900 uppercase text-xs tracking-[0.2em] shadow-xl shadow-cyan-500/20 active:scale-95 transition-all mt-4">
                Acessar Painel
            </button>

            <div class="flex items-center gap-4 my-6">
                <div class="h-[1px] flex-1 bg-border"></div>
                <span class="text-[8px] font-black text-neutral-700 uppercase tracking-[0.3em]">Ou entre com</span>
                <div class="h-[1px] flex-1 bg-border"></div>
            </div>

            <button id="btn-google" class="w-full bg-neutral-900 border border-border p-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-neutral-800 active:scale-95 transition-all shadow-lg">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                <span class="text-[10px] font-black uppercase tracking-widest text-neutral-300">Google Account</span>
            </button>

            <div class="flex flex-col gap-4 pt-6 text-center">
                <button id="btn-alternar" class="text-[10px] font-black text-neutral-500 uppercase tracking-widest hover:text-cyan-400 transition">
                    Não tem conta? <span class="text-white underline ml-1">Criar agora</span>
                </button>
                <a href="esqueciSenha.html" class="text-[9px] font-black text-neutral-600 uppercase tracking-widest hover:text-red-400 transition">
                    Esqueci minha senha
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppcnfUc5N4xuWq0UUmg6_idNLY8vRQdw",
            authDomain: "agendafacil-1.firebaseapp.com",
            projectId: "agendafacil-1",
            storageBucket: "agendafacil-1.firebasestorage.app",
            messagingSenderId: "862585496599",
            appId: "1:862585496599:web:2a360f1147a334d1342852"
        };

        // 1. Inicialização
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 2. Variáveis de Estado (Definidas no topo para evitar erros)
        let modoCadastro = false;
        const ADMIN_UIDS = ["OCPRLvTdW7c3tJSJyWAy7On7ueE2", "Q9iCOeZgGEUVBTr380iliC9wZfm2"];

        // 3. Elementos do DOM
        const btnAlternar = document.getElementById("btn-alternar");
        const areaCadastro = document.getElementById("area-cadastro");
        const btnPrincipal = document.getElementById("btn-principal");
        const subtitulo = document.getElementById("login-subtitle");
        const inputEmail = document.getElementById("email");
        const inputSenha = document.getElementById("senha");
        const inputNomeBarber = document.getElementById("reg-nome-barbearia");

        // 4. Lógica de Redirecionamento
        const redirecionarUsuario = (user) => {
            if (ADMIN_UIDS.includes(user.uid)) {
                window.location.href = "adm/boss.html";
            } else {
                // Se for cliente, vai para a index do sistema, não para o login novamente
                window.location.href = "https://agendafacil.buzz/index.html"; 
            }
        };
        
        // 5. Eventos de UI (Alternar entre Login/Cadastro)
        btnAlternar.onclick = () => {
            modoCadastro = !modoCadastro;
            if (modoCadastro) {
                areaCadastro.classList.remove("hidden");
                btnPrincipal.innerText = "Criar Minha Conta";
                subtitulo.innerText = "Cadastro de Parceiro";
                btnAlternar.innerHTML = 'Já tem conta? <span class="text-white underline ml-1">Fazer Login</span>';
            } else {
                areaCadastro.classList.add("hidden");
                btnPrincipal.innerText = "Acessar Painel";
                subtitulo.innerText = "Gestão Profissional";
                btnAlternar.innerHTML = 'Não tem conta? <span class="text-white underline ml-1">Criar agora</span>';
            }
        };

        // 6. Login com Google
        document.getElementById("btn-google").onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const docRef = doc(db, "perfis", user.uid);
                const docSnap = await getDoc(docRef);

                if (!docSnap.exists()) {
                    const expira = new Date();
                    expira.setDate(expira.getDate() + 7);
                    await setDoc(docRef, {
                        nomeBarbearia: user.displayName || "Meu Negócio",
                        email: user.email,
                        statusPagamento: "teste",
                        expiraEm: expira,
                        criadoEm: new Date(),
                        fotoUrl: user.photoURL
                    });
                }
                redirecionarUsuario(user);
            } catch (error) {
                alert("Erro Google: " + error.message);
            }
        };

        // 7. Login/Cadastro E-mail
        btnPrincipal.onclick = async () => {
            const email = inputEmail.value;
            const senha = inputSenha.value;
            const nomeBarber = inputNomeBarber.value;

            if (!email || !senha) return alert("Preencha e-mail e senha! 👊");

            try {
                if (modoCadastro) {
                    if (!nomeBarber) return alert("Nome do negócio é obrigatório!");
                    const res = await createUserWithEmailAndPassword(auth, email, senha);
                    const expira = new Date();
                    expira.setDate(expira.getDate() + 7);

                    await setDoc(doc(db, "perfis", res.user.uid), {
                        nomeBarbearia: nomeBarber,
                        email: email,
                        statusPagamento: "teste",
                        expiraEm: expira,
                        criadoEm: new Date()
                    });
                    redirecionarUsuario(res.user);
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, senha);
                    redirecionarUsuario(res.user);
                }
            } catch (e) {
                alert("Erro: " + e.message);
            }
        };
    </script>
</body>
</html>
