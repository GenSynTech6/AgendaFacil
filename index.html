<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgendaFacil</title>
    <link rel="icon" href="assets/img/iconeAgendaFacil.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        card: '#161616',
                        border: '#262626',
                        cyan: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }

        .tab-active {
            color: #22d3ee;
        }

        .tab-inactive {
            color: #525252;
        }

        .teal-gradient {
            background: linear-gradient(135deg, #0891b2, #0a0a0a);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }
    </style>
</head>

<body class="pb-32">

    <div id="loading" class="min-h-screen flex items-center justify-center fixed inset-0 bg-dark z-[300]">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-cyan-400"></div>
    </div>

    <div id="bloqueio-pagamento"
        class="hidden fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-card p-8 rounded-[2.5rem] w-full max-w-sm text-center border border-cyan-500/30 shadow-2xl">
            <div class="text-5xl mb-6">💳</div>
            <h2 class="text-2xl font-black text-white mb-2 italic tracking-tighter">Acesso Suspenso</h2>
            <p class="text-neutral-500 text-xs mb-8 leading-relaxed uppercase font-bold tracking-widest">Sua assinatura
                expirou. Ative o plano PRO para continuar.</p>
            <button onclick="window.location.href='contratacaoAssinatura.html'"
                class="w-full bg-cyan-500 p-4 rounded-2xl text-black font-black uppercase text-xs tracking-widest shadow-lg shadow-cyan-500/20 active:scale-95 transition">Ativar
                Agora</button>
            <button onclick="auth.signOut()"
                class="mt-6 text-[10px] text-neutral-600 underline uppercase font-black">Sair da conta</button>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center max-w-5xl mx-auto">
        <h1 class="text-xl font-black italic tracking-tighter">Agenda <span class="text-cyan-400">Fácil</span></h1>
        <button id="logout" onclick="auth.signOut()"
            class="text-[10px] font-black uppercase text-red-500/50 hover:text-red-500 transition">Sair</button>
    </header>

    <main id="dashboard" class="hidden px-6 max-w-5xl mx-auto space-y-6">

        <div
            class="bg-card p-6 rounded-[2.5rem] border border-border flex justify-between items-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 blur-3xl"></div>
            <div>
                <p id="status-plano-texto" class="text-[10px] font-black uppercase tracking-widest text-cyan-400">Plano
                    Ativo</p>
                <p id="data-expira-texto" class="text-xs text-neutral-500 font-bold mt-1 tracking-tight">Válido até:
                    --/--</p>
            </div>
            <button id="btn-mudar-agora"
                class="bg-white/5 border border-white/5 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-white/10 transition">Gerenciar</button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-card p-6 rounded-[2.5rem] border border-border shadow-xl">
                <p class="text-neutral-500 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Faturamento Hoje</p>
                <h2 id="faturamento" class="text-2xl font-black text-white italic tracking-tighter">R$ 0,00</h2>
            </div>
            <div class="bg-card p-6 rounded-[2.5rem] border border-border shadow-xl">
                <p class="text-neutral-500 text-[9px] uppercase font-black tracking-[0.2em] mb-2">Atendimentos</p>
                <h2 id="atendimentos" class="text-2xl font-black text-white italic tracking-tighter">0</h2>
            </div>
        </div>

        <section>
            <div class="flex items-center justify-between mb-4 px-2">
                <h3 class="text-[10px] font-black text-neutral-600 uppercase tracking-[0.3em]">Agenda de Hoje</h3>
                <div class="h-[1px] flex-1 bg-border mx-4"></div>
            </div>
            <div id="agenda" class="space-y-3">
            </div>
        </section>
    </main>

    <nav
        class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-card/80 backdrop-blur-xl border border-white/5 p-2 rounded-[2.5rem] flex justify-between items-center shadow-2xl z-50">
        <a href="https://agendafacil.buzz/index.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Início</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/clientes.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Clientes</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/servicos.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758L5 19m0-14l4.121 4.121" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Serviços</span>
            </button></a>
        <a href="https://agendafacil.buzz/(tabs)/config.html"><button
                class="flex-1 py-3 flex flex-col items-center gap-1 tab-inactive hover:text-neutral-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                </svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Ajustes</span>
            </button></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc,onSnapshot, query, collection, where, orderBy, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppcnfUc5N4xuWq0UUmg6_idNLY8vRQdw",
            authDomain: "agendafacil-1.firebaseapp.com",
            projectId: "agendafacil-1",
            storageBucket: "agendafacil-1.firebasestorage.app",
            messagingSenderId: "862585496599",
            appId: "1:862585496599:web:2a360f1147a334d1342852"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Exemplo de trava de segurança no Dashboard
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "perfis", user.uid));
                const dados = docSnap.data();

                // Se o teste grátis venceu e o status não é 'ativo'
                const hoje = new Date();
                if (hoje > dados.expiraEm.toDate() && dados.statusPagamento !== 'ativo') {
                    window.location.href = "contratacaoAssinatura.html?status=expirado";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        function monitorarAssinatura(uid) {
            onSnapshot(doc(db, "perfis", uid), (snap) => {
                document.getElementById("loading").classList.add("hidden");
                if (snap.exists()) {
                    const data = snap.data();
                    const agora = new Date();
                    const expiraEm = data.expiraEm ? data.expiraEm.toDate() : null;

                    if (expiraEm && agora > expiraEm) {
                        document.getElementById("bloqueio-pagamento").classList.remove("hidden");
                        document.getElementById("dashboard").classList.add("hidden");
                    } else {
                        document.getElementById("bloqueio-pagamento").classList.add("hidden");
                        document.getElementById("dashboard").classList.remove("hidden");

                        document.getElementById("status-plano-texto").innerText = data.statusPagamento === "ativo" ? "Plano PRO Ativo" : "Período de Teste";
                        document.getElementById("data-expira-texto").innerText = `Vence em: ${expiraEm.toLocaleDateString('pt-BR')}`;
                    }
                }
            });
        }

        function carregarAgenda(uid) {
            const q = query(collection(db, "agendamentos"), where("userId", "==", uid), orderBy("hora"));
            onSnapshot(q, (snap) => {
                let html = ""; let pago = 0; let total = 0;
                snap.forEach(d => {
                    const item = d.data();
                    const isPago = item.status === "concluido";
                    if (isPago) pago += item.preco;
                    total++;

                    html += `
                    <div class="bg-card p-5 rounded-[2rem] border border-border flex justify-between items-center ${isPago ? 'opacity-40' : 'border-l-4 border-cyan-400'}">
                        <div>
                            <p class="font-black text-sm tracking-tighter italic ${isPago ? 'line-through' : 'text-cyan-400'}">${item.hora} - ${item.cliente}</p>
                            <p class="text-[9px] font-bold text-neutral-600 uppercase tracking-widest mt-1">${item.servico}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="alternarStatus('${d.id}', '${item.status}')" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/5">${isPago ? '✅' : '💰'}</button>
                            <button onclick="removerAgendamento('${d.id}')" class="text-neutral-700 hover:text-red-500 transition">✕</button>
                        </div>
                    </div>`;
                });
                document.getElementById("agenda").innerHTML = html || `<div class="py-20 text-center opacity-20 font-black uppercase text-[10px] tracking-[0.3em]">Nenhum horário hoje</div>`;
                document.getElementById("faturamento").innerText = `R$ ${pago.toFixed(2)}`;
                document.getElementById("atendimentos").innerText = total;
            });
        }

        window.alternarStatus = async (id, status) => {
            const novoStatus = status === "pendente" ? "concluido" : "pendente";
            await updateDoc(doc(db, "agendamentos", id), { status: novoStatus });
        };

        window.removerAgendamento = async (id) => {
            if (confirm("Excluir este agendamento?")) await deleteDoc(doc(db, "agendamentos", id));
        };
    </script>
</body>

</html>
